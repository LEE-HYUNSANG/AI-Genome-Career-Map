{% extends 'base.html' %}
{% block content %}

        <li>L3: 가치관 파악</li>
        <li>L4: AI 및 비즈니스 역량 진단</li>
        <li>L5: 학습 목표와 선호도 조사</li>

</section>
<section>

    <p>진단 후 제공되는 그래프와 추천 직무 예시를 확인할 수 있습니다.</p>
</section>
